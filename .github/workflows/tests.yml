name: Testler

# Deploy'u otomatiklestirmiyor (barindirma FTP-only, bkz. deploy/deploy.py) -
# amac kirik kodun master'a sessizce girmesini engellemek. 11 Temmuz 2026'da
# yasadigimiz kesintiler (composer dev/no-dev autoload karisikligi, Sail
# service provider'inin --no-dev ortaminda instantiate edilmeye calisilmasi)
# yerel testlerde hic yakalanmiyordu cunku yerel gelistirme ortami hep
# dev-dahil calisiyor - production-boot-check job'u TAM OLARAK bu sinif
# hatalari, production'a hic dokunmadan, her push'ta otomatik yakalar.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP kurulumu
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, gd, zip
          coverage: none

      - name: .env hazirla (composer'in package:discover kancasi .env'e ihtiyac duyuyor)
        run: cp .env.example .env

      - name: Composer bagimliliklarini kur
        run: composer install --no-interaction --prefer-dist

      - name: APP_KEY uret
        run: php artisan key:generate

      - name: Node kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend derle (public/build .gitignore'da, testler @vite icin gerektiriyor)
        run: npm ci && npm run build

      - name: Testleri calistir
        run: vendor/bin/phpunit

  production-boot-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP kurulumu
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, gd, zip
          coverage: none

      - name: .env hazirla (composer'in package:discover kancasi .env'e ihtiyac duyuyor)
        run: cp .env.example .env

      - name: SADECE production bagimliliklarini kur (--no-dev, production'daki ayni durum)
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: APP_KEY uret (DB'ye dokunmadan)
        run: php artisan key:generate --force

      - name: Bootstrap dumani - autoload/service-provider hatalarini yakalar
        run: |
          php artisan route:list --no-ansi > /dev/null
          php -r '
            require "vendor/autoload.php";
            require "bootstrap/app.php";
            echo "AUTOLOAD_VE_BOOTSTRAP_OK" . PHP_EOL;
          '

      - name: dev-only paket sizintisi kontrolu (myclabs/deep-copy sinifi hatalar)
        run: |
          php -r '
            $composerJson = json_decode(file_get_contents("composer.json"), true);
            $devPackages = array_keys($composerJson["require-dev"] ?? []);
            $leaked = [];
            foreach (["vendor/composer/autoload_classmap.php", "vendor/composer/autoload_static.php", "vendor/composer/autoload_real.php", "vendor/composer/autoload_files.php"] as $file) {
                if (!file_exists($file)) continue;
                $content = file_get_contents($file);
                foreach ($devPackages as $pkg) {
                    $fragment = explode("/", $pkg)[1];
                    if (str_contains($content, $fragment)) { $leaked[] = "$pkg -> $file"; }
                }
            }
            if ($leaked) {
                fwrite(STDERR, "DEV-ONLY PAKET SIZINTISI:\n" . implode("\n", $leaked) . "\n");
                exit(1);
            }
            echo "Sizinti yok.\n";
          '
