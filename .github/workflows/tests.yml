name: Testler

# Deploy'u otomatiklestirmiyor (barindirma FTP-only, bkz. deploy/deploy.py) -
# amac sadece kirik kodun master'a sessizce girmesini engellemek. Bugun
# yasadigimiz kesintiler kod hatasi degil altyapi/config hatasiydi, bu
# workflow onlari yakalamaz - ama gelecekteki mantik hatalarini yakalar.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP kurulumu
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, gd, zip
          coverage: none

      - name: Composer bagimliliklarini kur
        run: composer install --no-interaction --prefer-dist

      - name: .env hazirla
        run: cp .env.example .env && php artisan key:generate

      - name: Testleri calistir
        run: vendor/bin/phpunit
